<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/registration.css" />
  </head>

  <body>
    <button onclick="window.location.href='./main.html'" style="position:fixed;top:20px;right:24px;z-index:100">Return to Homepage</button>
    <form class="form login">
      <h1>Welcome Back</h1>
      <p>Login to your account</p>

      <input id = "user-input" type="text" placeholder="Username" required />
      <input id = "password-input" type="password" placeholder="Password" required />

      <span id="login-error" style="color:var(--color-primary);font-size:14px;display:none"></span>
      <button id="login-button" type="button">Login</button>
      <a class="change-password-link" href="./change-password.html">Change password</a>
      <a class="forgot-password-link" href="./forgot-password.html">Forgot password</a>
    </form>

    <script type="module" src="../scripts/requests.js"></script>
    <script type="module" src="../scripts/main.js"></script>
  </body>
</html>
