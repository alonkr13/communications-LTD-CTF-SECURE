<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Telecom Page</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/clients.css" />
  </head>

  <body style="background: white">
    <h1 style="justify-self: center">Manage youre clients</h1>

    <div class="clients-container">
      <span class="client-row">
        <p>customer</p>
        <p>package</p>
        <p>monthly price</p>
        <p>action</p>
      </span>

    </div>

    <button id="add-customer-btn" class="add-customer-btn">Add New Customer</button>

    <div id="customer-modal" class="modal">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <h2>Add New Customer</h2>
        <form id="customer-form">
          <div class="form-group">
            <label for="customer-name">Customer Name</label>
            <input type="text" id="customer-name" name="customer-name" required />
          </div>
          <div class="form-group">
            <label for="package-select">Package</label>
            <select id="package-select" name="package-select" required>
              <option value="">Select a package</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="button" id="cancel-btn" class="btn-cancel">Cancel</button>
            <button type="submit" id="create-btn" class="btn-create">Create</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="../scripts/clients.js"></script>
  </body>
</html>
